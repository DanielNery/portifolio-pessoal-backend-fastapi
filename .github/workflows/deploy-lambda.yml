name: Deploy to AWS Lambda

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR repository if it does not exist
        env:
          ECR_REPOSITORY: ${{ secrets.LAMBDA_FUNCTION_NAME }}
        run: |
          aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" \
            || aws ecr create-repository \
                 --repository-name "$ECR_REPOSITORY" \
                 --image-scanning-configuration scanOnPush=true \
                 --image-tag-mutability MUTABLE

      - name: Build, tag and push Docker image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.LAMBDA_FUNCTION_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker build -f Dockerfile.lambda -t "$IMAGE_URI" .
          docker push "$IMAGE_URI"
          echo "image=$IMAGE_URI" >> "$GITHUB_OUTPUT"

      - name: Create or update Lambda function
        env:
          FUNCTION_NAME: ${{ secrets.LAMBDA_FUNCTION_NAME }}
          IMAGE_URI: ${{ steps.build-image.outputs.image }}
          LAMBDA_ROLE_ARN: ${{ secrets.LAMBDA_ROLE_ARN }}
          MONGODB_URL: ${{ secrets.MONGODB_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
        run: |
          ENV_VARS="Variables={\
          MONGODB_URL=$MONGODB_URL,\
          SMTP_HOST=$SMTP_HOST,\
          SMTP_PORT=$SMTP_PORT,\
          SMTP_USER=$SMTP_USER,\
          SMTP_PASSWORD=$SMTP_PASSWORD,\
          EMAIL_TEMPLATES_PATH=/var/task/app/email/templates\
          }"

          if aws lambda get-function --function-name "$FUNCTION_NAME" > /dev/null 2>&1; then
            echo "Lambda '$FUNCTION_NAME' já existe — atualizando código..."

            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --image-uri "$IMAGE_URI"

            aws lambda wait function-updated \
              --function-name "$FUNCTION_NAME"

            aws lambda update-function-configuration \
              --function-name "$FUNCTION_NAME" \
              --environment "$ENV_VARS"

            aws lambda wait function-updated \
              --function-name "$FUNCTION_NAME"

            echo "Atualização concluída."
          else
            echo "Lambda '$FUNCTION_NAME' não existe — criando..."

            aws lambda create-function \
              --function-name "$FUNCTION_NAME" \
              --package-type Image \
              --code ImageUri="$IMAGE_URI" \
              --role "$LAMBDA_ROLE_ARN" \
              --timeout 30 \
              --memory-size 512 \
              --environment "$ENV_VARS"

            aws lambda wait function-active \
              --function-name "$FUNCTION_NAME"

            echo "Criação concluída."
          fi
